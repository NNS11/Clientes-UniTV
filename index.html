<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITV FREE - GESTÃO</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #212529;
      --card: #ffffff;
      --primary: #28a745; /* Verde */
      --cliente: #007bff; /* Azul */
      --revendedor: #f39c12; /* Laranja/Dourado */
      --border: #dee2e6;
      --label: #666;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --text: #e0e0e0;
      --card: #1e1e1e;
      --border: #333;
      --label: #aaa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background-color 0.3s;
    }

    header {
      background: linear-gradient(135deg, var(--primary), #218838);
      color: white;
      text-align: center;
      padding: 1.5rem 1rem;
    }

    .logo { width: 120px; margin-bottom: 10px; }

    .container {
      max-width: 640px;
      margin: 20px auto;
      padding: 0 16px;
    }

    /* Estatísticas no topo */
    .stats-card {
      display: flex;
      gap: 12px;
      background: linear-gradient(135deg, var(--primary), #218838);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      color: white;
      box-shadow: 0 4px 15px rgba(40,167,69,0.3);
    }

    .stat { text-align: center; flex: 1; }
    .stat-label { font-size: 0.8rem; opacity: 0.9; display: block; }
    .stat-value { font-size: 1.2rem; font-weight: 700; }

    /* Abas de Categoria */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 5px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
    }

    /* Estilo do Quadrado (Card) */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      position: relative;
      border-top: 5px solid transparent;
    }

    .card.tipo-cliente { border-top-color: var(--cliente); }
    .card.tipo-revendedor { border-top-color: var(--revendedor); }

    .badge {
      position: absolute;
      top: 10px;
      right: 15px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    .badge-cliente { background: rgba(0, 123, 255, 0.2); color: var(--cliente); }
    .badge-revendedor { background: rgba(243, 156, 18, 0.2); color: var(--revendedor); }

    .client-name {
      font-weight: bold;
      font-size: 1.3rem;
      margin-bottom: 18px;
      display: block;
      padding-right: 100px;
    }

    .info-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 1.05rem;
    }

    .label {
      width: 130px;
      color: var(--label);
      flex-shrink: 0;
    }

    .value-container {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .txt-green { color: var(--primary); }
    .txt-cliente { color: var(--cliente); }
    .txt-revendedor { color: var(--revendedor); }

    .whatsapp-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body data-theme="dark">

  <header>
    <img src="https://tivva.com.br/wp-content/uploads/2025/11/tv-logo-1-1.webp" alt="UniTV" class="logo">
    <h1>GESTOR UNITV</h1>
  </header>

  <div class="container">
    <!-- Estatísticas Dinâmicas -->
    <div class="stats-card">
      <div class="stat">
        <span class="stat-label">💰 Valor (<span id="txtFiltro">Geral</span>)</span>
        <span id="totalFaturamento" class="stat-value">R$ 0,00</span>
      </div>
      <div class="stat">
        <span class="stat-label">📦 Contas</span>
        <span id="totalContas" class="stat-value">0</span>
      </div>
    </div>

    <!-- Categorias -->
    <div class="tabs">
      <button class="tab-btn active" onclick="filtrar('todos', this)">TODOS</button>
      <button class="tab-btn" onclick="filtrar('cliente', this)">CLIENTES</button>
      <button class="tab-btn" onclick="filtrar('revendedor', this)">REVENDEDORES</button>
    </div>

    <div class="controls">
      <input type="text" id="search" class="search-box" placeholder="Pesquisar por nome...">
    </div>

    <div id="listContainer"></div>
  </div>

  <script>
    // Todos os seus dados originais estão aqui como "cliente"
    let dados = [
      { id: 1, tipo: "cliente", nome: "Luis Rogerio F Pinto Jardim", whatsapp: "(21) 99974-1447", totalContas: 2, totalPago: 170.00, aparelhos: ["TV Box (Amiko Xpro)"], datasCompras: ["27/03/2026", "09/04/2026"] },
      { id: 2, tipo: "cliente", nome: "Darlan de Almeida Oliveira", whatsapp: "(44) 93300-3078", totalContas: 1, totalPago: 100.00, aparelhos: ["Celular"], datasCompras: ["11/04/2026"] },
      { id: 3, tipo: "cliente", nome: "André Luis de Oliveira", whatsapp: "(19) 99954-3025", totalContas: 1, totalPago: 100.00, aparelhos: ["TV Box (BTV13)"], datasCompras: ["21/04/2026"] },
      { id: 4, tipo: "cliente", nome: "Morvan Torales Vianna", whatsapp: "(54) 99689-6959", totalContas: 1, totalPago: 100.00, aparelhos: ["Android TV (TCL)"], datasCompras: ["28/04/2026"] },
      { id: 5, tipo: "cliente", nome: "Renato Menezes de Lima Sa", whatsapp: "(11) 91448-2900", totalContas: 2, totalPago: 170.00, aparelhos: ["Projetor (HY300)", "TV Box"], datasCompras: ["07/05/2026"] },
      { id: 6, tipo: "cliente", nome: "Carlos Eduardo Pinto", whatsapp: "(12) 98804-1525", totalContas: 1, totalPago: 100.00, aparelhos: ["Projetor (Wanbo T4)"], datasCompras: ["10/05/2026"] },
{ id: 7, tipo: "cliente", nome: "Joanísio Pereira Lopes", whatsapp: "(33) 99136-7212", totalContas: 2, totalPago: 160.00, aparelhos: ["Android TV (AIWA)"], datasCompras: ["04/07/2026"] },
{ id: 8, tipo: "cliente", nome: "Antonio Magno Carvalho", whatsapp: "(41) 99115-9971", totalContas: 1, totalPago: 100.00, aparelhos: ["TV Stick (Fire Stick)"], datasCompras: ["06/07/2026"] },
      
      // Exemplo de Revendedores (Para teste)
      { id: 1, tipo: "revendedor", nome: "Phablo Vinicius Dias de Sousa", whatsapp: "(61) 98678-1225", totalContas: 1, totalPago: 55.00, aparelhos: [], datasCompras: ["18/06/2026"] },
      { id: 2, tipo: "revendedor", nome: "Edson Ferreira de Lira", whatsapp: "(11) 97090-8963", totalContas: 2, totalPago: 110.00, aparelhos: [], datasCompras: ["18/06/2026"] },
{ id: 3, tipo: "revendedor", nome: "Bruno Porto de Souza", whatsapp: "(11) 94084-8693", totalContas: 2, totalPago: 110.00, aparelhos: [], datasCompras: ["24/06/2026"] },
{ id: 4, tipo: "revendedor", nome: "Daniel Tavares D Avila", whatsapp: "(31) 98895-1000", totalContas: 2, totalPago: 110.00, aparelhos: [], datasCompras: ["26/06/2026"] },
{ id: 5, tipo: "revendedor", nome: "Bernardo Braz Pinheiro", whatsapp: "(31) 99667-7268", totalContas: 4, totalPago: 200.00, aparelhos: [], datasCompras: ["30/06/2026, 03/07/2026"] }
    ];

    let filtroAtual = 'todos';

    function atualizarStats(lista) {
      const faturamento = lista.reduce((sum, item) => sum + item.totalPago, 0);
      const contas = lista.reduce((sum, item) => sum + item.totalContas, 0);
      document.getElementById('totalFaturamento').textContent = faturamento.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      document.getElementById('totalContas').textContent = contas;
      const labels = { todos: "Geral", cliente: "Clientes", revendedor: "Revendedores" };
      document.getElementById('txtFiltro').textContent = labels[filtroAtual];
    }

    function filtrar(tipo, btn) {
      filtroAtual = tipo;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderizar();
    }

    function renderizar() {
      const container = document.getElementById("listContainer");
      const busca = document.getElementById("search").value.toLowerCase();
      
      let filtrados = dados.filter(p => filtroAtual === 'todos' ? true : p.tipo === filtroAtual);
      filtrados = filtrados.filter(p => p.nome.toLowerCase().includes(busca));

      atualizarStats(filtrados);
      container.innerHTML = "";

      filtrados.forEach(p => {
        const whatsLimpo = p.whatsapp.replace(/\D/g, '');
        const corId = p.tipo === 'cliente' ? 'txt-cliente' : 'txt-revendedor';
        const labelTipo = p.tipo === 'cliente' ? 'Cliente' : 'Revendedor';
        
        // Verifica se é cliente para mostrar a linha de aparelhos
        const linhaAparelhos = p.tipo === 'cliente' ? `
          <div class="info-row">
            <span class="label">Aparelhos</span>
            <div class="value-container txt-green">📱 ${p.aparelhos.join(', ')}</div>
          </div>
        ` : '';

        const card = document.createElement("div");
        card.className = `card tipo-${p.tipo}`;
        card.innerHTML = `
          <span class="badge badge-${p.tipo}">${labelTipo}</span>
          <span class="client-name">${p.nome}</span>
          
          <div class="info-row">
            <span class="label">ID</span>
            <div class="value-container ${corId}">👤 ${labelTipo} #${p.id}</div>
          </div>
          
          <div class="info-row">
            <span class="label">WhatsApp</span>
            <div class="value-container" style="color:var(--text)">📞 ${p.whatsapp}</div>
          </div>
          
          <div class="info-row">
            <span class="label">Contas</span>
            <div class="value-container txt-green">📦 ${p.totalContas}</div>
          </div>
          
          <div class="info-row">
            <span class="label">Total Pago</span>
            <div class="value-container txt-green">💵 R$ ${p.totalPago.toFixed(2).replace('.', ',')}</div>
          </div>
          
          ${linhaAparelhos}
          
          <div class="info-row">
            <span class="label">Datas Compras</span>
            <div class="value-container txt-green">🛒 ${p.datasCompras.join(', ')}</div>
          </div>

          <a href="https://wa.me/55${whatsLimpo}" target="_blank" class="whatsapp-btn">
            Abrir WhatsApp
          </a>
        `;
        container.appendChild(card);
      });
    }

    document.getElementById("search").addEventListener("input", renderizar);
    window.onload = renderizar;
  </script>
</body>
</html>
